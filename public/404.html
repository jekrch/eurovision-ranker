<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Eurovision Ranker</title>
    <script>
        // GitHub Pages SPA redirect: rewrites the path into a query string so
        // index.html can decode it back and React Router (or our own URL handler)
        // sees the original deep link.
        // Pattern from https://github.com/rafgraph/spa-github-pages
        (function () {
            var pathSegmentsToKeep = 0;
            var l = window.location;
            l.replace(
                l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
                l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
                (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                l.hash
            );
        })();
    </script>
</head>
<body></body>
</html>
